# OSCAR EMR — Ontario configuration
# This file is mounted into the OSCAR container at /root/oscar.properties

# Database connection (values injected by Docker at runtime via environment)
db_name = oscar?zeroDateTimeBehavior=round&useOldAliasMetadataBehavior=true&jdbcCompliantTruncation=false

# Ontario billing region — required for ON billing forms
billregion=ON

# Ontario clinical program
program=on

# Confidentiality footer on printed documents
confidentiality_statement.v1=This document may contain personal health information. Please consider confidentiality when distributing or disposing of this document.

# LDAP disabled — local DB auth only
ldap.enabled=false

# E2E export (differential)
E2E_DIFF=on
